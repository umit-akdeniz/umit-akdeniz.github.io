<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Image</title>
    <style>
        /* Sayfanın tamamını kaplayacak şekilde stil */
        body {
            margin: 0; /* Varsayılan boşlukları kaldır */
            height: 100vh; /* Sayfanın tam yüksekliği */
            display: flex; /* Flexbox ile merkezleme */
            justify-content: center; /* Yatayda merkezleme */
            align-items: center; /* Dikeyde merkezleme */
        }

        /* Resmi boyutlandırmak için (isteğe bağlı) */
        img {
            max-width: 100%; /* Resmin taşmasını önler */
            height: auto; /* Oranı korur */
        }
    </style>
</head>
<body>
    <img src="umitakdeniz-biolink.png" alt="Centered Image">
</body>
</html>
